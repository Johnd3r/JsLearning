<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script src="calculadoraBasica.js"></script>
</head>
<style>
    body{
        background-color: black;
        font-family: 'Poppins', sans-serif;
    }
/*     {    
        color: aqua;
    } */
    .sentence, #tit, #resultado{
        color: white;
    }
</style>
<body onload="funcionInicial()">
    <h1 id="tit">Calculadora Basica</h1>
    <form id="calculadora" >
        <label class="sentence">Digita tu primer numero:</label>
        <input type="number" id="digitoA" placeholder="Escribe aca tu primer digito A">
    <br><br>
        <label class="sentence">Digita tu segundo numero:</label>
        <input type="number" id="digitoB" placeholder="Escribe aca tu segundo digito B">
    </form>
    <button id="sumarBtn" onclick="sumar()">Sumar</button>
    <p id="resultado"></p>
</body>
</html>
