<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <title>Listado de personas</title>
</head>
<!--Se agrega el evento DOM 'onload' que se encarga de ejecutar la funcion mostrarList al cargar la pagina (Aun no se si sea buena practica)-->
<body onload="mostrarList()">
    <h1 id="cabecero" class="contenedor">Lista de personas</h1>
    <div class="contenedor">
        <div class="elemento">
            <li id="personaLista"></li>
        </div>
    </div>

    <div class="contenedor">
        <div style="text-align: center;">
        <button onclick="agregarPersona()">+</button>
    </div>
    <form id="formu">
        <input id="nombreF" type="text" placeholder="Ingresa Nombre"> 
        <input id="apellidoF" type="text" placeholder="Ingresa Apellido"> 
    </form>
    
    <!--Se agrega el enlace al scrip de js abajo antes del body-->
    <script src="persona.js"></script>
    <script src="app.js"></script>
</body>
</html>
