<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="presupuestoApp.css">
    <title>Presupuesto WAPP</title>
</head>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
<body onload="cargarApp()">
    <div class="cabecero">
        <div class="presupuesto">
            <div class="presupuesto_titulo">Presupuesto Disponible</div>
            <div class="presupuesto_valor" id="dineroDisponible">+ 300.00</div>     

            <div class="presupuesto_ingreso limpiarEstilos">
                <div class="presupuesto_ingreso--texto">INGRESOS</div>
                <div class="derecha">
                    <div class="presupuesto_ingreso--valor" id="totalIngresos">0.00</div>
                    <div id="porcentajeIngreso" class="presupuesto_ingreso--porcentaje"></div>
                </div>
            </div>
            <div class="presupuesto_egreso limpiarEstilos">
                    <div class="presupuesto_egreso--texto">EGRESos</div>
                    <div class="derecha">
                        <div class="presupuesto_egreso--valor" id="totalEgresos" >1000.00</div>
                        <div class="presupuesto_egreso--porcentaje" id="porcentajeEgreso">160%</div>
                    </div>
                </div>   
            </div>               
        </div> 
        <div class="agregar limpiarEstilos">
            <form class="agregar_contenedor">
                <select name="tipo" class="agregar_tipo">
                    <option value="suma">+</option>
                    <option value="resta">-</option>            
                </select>   
                <input class="agregar_descripcion" id="descripcionEl" placeholder="Descripcion">
                <input class="agregar_descripcion" id="descripcionEl" placeholder="Ingresa el valor">
                <button class="agregar_btn">
                    <ion-icon name="checkmark-circle-outline"></ion-icon>
                </button>
            </form>
        </div>
        <div class="contenedor limpiarEstilos">
            <div class="ingreso">
                <h2 class="ingreso_titulo">INGRESOS</h2>
                <div id="lista-ingresos">
<!--                     <div class="elemento limpiarEstilos">
                        <div class="elemento_descripcion">Salario</div>
                        <div class="derecha limpiarEstilos">
                        <div class="elemento_valor">1000.00</div>
                        <div class="elemento_eliminar">
                            <button class="elemento_eliminar--btn">
                                <ion-icon name='close-outline'></ion-icon>
                            </button>
                        </div>
                        </div>          
                    </div> -->
                </div>
            </div>
                <div class="egreso">
                    <h2 class="egreso_titulo">EGRESOS</h2>
                    <div id="lista-egresos">
<!--                         <div class="elemento limpiarEstilos">
                            <div class="elemento_descripcion">Deuda</div>
                            <div class="derecha limpiarEstilos">
                            <div class="elemento_valor">70.00</div>
                            <div class="elemento_porcentaje">160%</div>
                            <div class="elemento_eliminar">
                                <button class="elemento_eliminar--btn">
                                    <ion-icon name='close-outline'></ion-icon>
                                </button>
                            </div>
                            </div>
                        </div> -->
                    </div>
            </div>
    </div>
    <script src="Dato.js"></script>
    <script src="Ingreso.js"></script>
    <script src="Egreso.js"></script>
    <script src="PresupuestoApp.js"></script>
</body>
</html>
