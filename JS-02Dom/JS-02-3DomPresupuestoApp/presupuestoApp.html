<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/JS-02Dom/JS-02-3DomPresupuestoApp/presupuestoApp.css">
    <title>Presupuesto WAPP</title>
</head>
<body>
    <div class="cabecero">
        <div class="presupuesto">
            <div class="presupuesto_titulo">Presupuesto Disponible</div>
            <div class="presupuesto_valor">+ 300.00</div>     

            <div class="presupuesto_ingreso limpiarEstilos">
                <div class="presupuesto_ingreso--texto">INGRESOS</div>
                <div class="derecha">
                    <div class="presupuesto_ingreso--valor">0.00</div>
                    <div class="presupuesto_ingreso--porcentaje"></div>
                </div>
            </div>
            <div class="presupuesto_egreso limpiarEstilos">
                    <div class="presupuesto_egreso--texto">EGRESos</div>
                    <div class="derecha">
                        <div class="presupuesto_egreso--valor">1000.00</div>
                        <div class="presupuesto_egreso--porcentaje">160%</div>
                    </div>
                </div>   
            </div>               
        </div>        
    </div>
</body>
</html>
